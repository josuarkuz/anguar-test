<div class="accordion">
  <div class="accordion__header">
    <h2 class="accordion__title">Accordion</h2>
    <p class="accordion__description">
      Accessible expandable sections with semantic buttons and ARIA state.
    </p>
  </div>

  <div class="accordion__items">
    @for (item of items; track item.id; let i = $index) {
      <section class="accordion__item">
        <h3 class="accordion__item-heading">
          <button
            class="accordion__trigger"
            type="button"
            [id]="getHeaderId(i)"
            [attr.aria-expanded]="isOpen(i)"
            [attr.aria-controls]="getPanelId(i)"
            (click)="toggleItem(i)"
          >
            <span>{{ item.title }}</span>

            <span class="accordion__icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" class="accordion__icon-svg">
                <path
                  *ngIf="isOpen(i)"
                  d="M5 12h14"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                />
                <ng-container *ngIf="!isOpen(i)">
                  <path
                    d="M5 12h14"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                  <path
                    d="M12 5v14"
                    fill="none"
                    stroke="currentColor"
                    stroke-width="2"
                    stroke-linecap="round"
                  />
                </ng-container>
              </svg>
            </span>
          </button>
        </h3>

        @if (isOpen(i)) {
          <div
            class="accordion__panel"
            role="region"
            [id]="getPanelId(i)"
            [attr.aria-labelledby]="getHeaderId(i)"
          >
            <p>{{ item.content }}</p>
          </div>
        }
      </section>
    }
  </div>
</div>
