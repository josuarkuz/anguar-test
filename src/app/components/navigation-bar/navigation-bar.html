<nav class="navigation-bar" aria-label="Primary">
  <div class="navigation-bar__inner">
    <a class="navigation-bar__brand" routerLink="/" (click)="onNavigate()">
      MindTeams A11y Demo
    </a>

    <button
      class="navigation-bar__mobile-toggle"
      type="button"
      [attr.aria-expanded]="mobileMenuOpen()"
      aria-controls="primary-navigation"
      aria-label="Toggle navigation menu"
      (click)="toggleMobileMenu()"
    >
      <span class="navigation-bar__mobile-toggle-line"></span>
      <span class="navigation-bar__mobile-toggle-line"></span>
      <span class="navigation-bar__mobile-toggle-line"></span>
    </button>

    <div
      id="primary-navigation"
      class="navigation-bar__menu"
      [class.navigation-bar__menu--open]="mobileMenuOpen()"
    >
      <ul class="navigation-bar__list">
        @for (item of navItems; track item.label) {
          <li class="navigation-bar__item">
            @if (!item.children?.length) {
              <a
                class="navigation-bar__link"
                [routerLink]="item.route || '/'"
                routerLinkActive="navigation-bar__link--active"
                [routerLinkActiveOptions]="{ exact: item.route === '/' }"
                (click)="onNavigate()"
              >
                {{ item.label }}
              </a>
            } @else {
              <div
                class="navigation-bar__dropdown"
                [class.navigation-bar__dropdown--open]="componentsMenuOpen()"
              >
                <button
                  id="components-menu-button"
                  class="navigation-bar__link navigation-bar__dropdown-trigger"
                  type="button"
                  aria-haspopup="true"
                  [attr.aria-expanded]="componentsMenuOpen()"
                  [attr.aria-controls]="componentsMenuOpen() ? 'components-menu' : null"
                  (click)="toggleProductsMenu()"
                  (keydown)="onMenuButtonKeydown($event)"
                >
                  {{ item.label }}
                  <span class="navigation-bar__caret" aria-hidden="true">
                    <svg
                      class="navigation-bar__caret-icon"
                      viewBox="0 0 24 24"
                      focusable="false"
                    >
                      <path
                        d="M6 9l6 6 6-6"
                        fill="none"
                        stroke="currentColor"
                        stroke-width="2"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                      />
                    </svg>
                  </span>
                </button>

                <ul
                  id="components-menu"
                  class="navigation-bar__dropdown-menu"
                  role="menu"
                >
                  @for (child of item.children; track child.label) {
                    <li role="none">
                      <a
                        class="navigation-bar__dropdown-link"
                        role="menuitem"
                        [routerLink]="child.route"
                        routerLinkActive="navigation-bar__dropdown-link--active"
                        (keydown)="onDropdownItemKeydown($event)"
                        (click)="onNavigate()"
                      >
                        {{ child.label }}
                      </a>
                    </li>
                  }
                </ul>
              </div>
            }
          </li>
        }
      </ul>
    </div>
  </div>
</nav>
